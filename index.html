<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Calles de Alberdi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #05050a;
      width: 100%; height: 100%;
      overflow: hidden;
      touch-action: none;
      position: fixed;
      inset: 0;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }

    /* ── Virtual gamepad — overlays the canvas ──────────────────────────────── */
    #gamepad {
      display: none;
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1000;
      user-select: none;
      -webkit-user-select: none;
      transition: opacity 0.2s;
    }
    #gamepad.dialogue-active {
      opacity: 0;
    }

    /* D-pad cluster — bottom-left */
    #dpad {
      position: absolute;
      left: 12px;
      bottom: 28px;
      width: 140px;
      height: 140px;
      pointer-events: none;
    }
    .dpad-btn {
      position: absolute;
      width: 46px;
      height: 46px;
      background: rgba(255,255,255,0.10);
      border: 2px solid rgba(255,255,255,0.22);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: rgba(255,255,255,0.5);
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
    }
    .dpad-btn:active, .dpad-btn.active { background: rgba(255,255,255,0.28); }
    #btn-up    { top: 0;    left: 47px; }
    #btn-down  { bottom: 0; left: 47px; }
    #btn-left  { top: 47px; left: 0;    }
    #btn-right { top: 47px; right: 0;   }

    /* Action buttons — bottom-right */
    #actions {
      position: absolute;
      right: 12px;
      bottom: 28px;
      width: 160px;
      height: 120px;
      pointer-events: none;
    }
    .action-btn {
      position: absolute;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      color: #fff;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
    }
    .action-btn:active, .action-btn.active { filter: brightness(1.5); }
    #btn-punch   { background: rgba(255,200,60,0.35); border: 2px solid rgba(255,200,60,0.6);
                   bottom: 32px; left: 0; }
    #btn-kick    { background: rgba(255,100,40,0.35); border: 2px solid rgba(255,100,40,0.6);
                   bottom: 32px; right: 0; }
    #btn-special { background: rgba(200,80,255,0.35); border: 2px solid rgba(200,80,255,0.6);
                   top: 0; left: 52px; font-size: 16px; }

    /* START / BACK pills */
    .pill-btn {
      position: absolute;
      min-width: 60px;
      height: 28px;
      padding: 6px 14px;
      border-radius: 14px;
      font-size: 11px;
      font-weight: bold;
      color: #fff;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pill-btn:active { filter: brightness(1.5); }
    #btn-start { background: rgba(80,200,80,0.35); border: 2px solid rgba(80,200,80,0.6);
                 bottom: 172px; right: 12px; }
    #btn-back  { background: rgba(160,160,160,0.25); border: 2px solid rgba(160,160,160,0.5);
                 bottom: 172px; left: 12px; }

    /* QR Code overlay */
    #qr-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 2000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: monospace;
    }
    #qr-overlay.visible { display: flex; }
    #qr-overlay img { border: 8px solid #fff; border-radius: 8px; margin: 16px; }
    #qr-overlay .qr-title { font-size: 18px; margin-bottom: 8px; }
    #qr-overlay .qr-url { font-size: 11px; color: #aaa; word-break: break-all; max-width: 80%; text-align: center; }
    #qr-overlay .qr-close { margin-top: 16px; padding: 8px 24px; background: rgba(255,80,80,0.5); border: 2px solid rgba(255,80,80,0.8); border-radius: 8px; cursor: pointer; color: #fff; font-size: 14px; }

    /* Join room overlay (mobile-friendly text input) */
    #join-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 2000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: monospace;
    }
    #join-overlay.visible { display: flex; }
    #join-overlay .join-title { font-size: 18px; margin-bottom: 16px; }
    #join-input {
      font-size: 36px; letter-spacing: 12px; text-align: center;
      width: 200px; padding: 8px 12px;
      background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.4);
      border-radius: 8px; color: #fff; font-family: monospace;
      text-transform: uppercase; outline: none;
    }
    #join-input::placeholder { color: rgba(255,255,255,0.25); letter-spacing: 4px; font-size: 18px; }
    #join-input:focus { border-color: rgba(80,200,80,0.8); }
    #join-submit {
      margin-top: 16px; padding: 10px 32px;
      background: rgba(80,200,80,0.4); border: 2px solid rgba(80,200,80,0.7);
      border-radius: 8px; color: #fff; font-size: 16px; font-family: monospace;
      cursor: pointer;
    }
    #join-submit:active { filter: brightness(1.4); }
    #join-cancel {
      margin-top: 10px; padding: 6px 20px;
      background: rgba(160,160,160,0.25); border: 2px solid rgba(160,160,160,0.5);
      border-radius: 8px; color: #fff; font-size: 13px; font-family: monospace;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- QR Code overlay for multiplayer -->
  <div id="qr-overlay">
    <div class="qr-title">Escaneá o ingresá el código</div>
    <div id="qr-room-code" style="font-size:36px; letter-spacing:8px; font-family:monospace; color:#fff; margin:8px 0;"></div>
    <img id="qr-img" width="200" height="200" alt="QR Code" style="border-radius: 4px;" />
    <div class="qr-url" id="qr-url-text"></div>
    <div class="qr-close" id="qr-close">CERRAR</div>
  </div>

  <!-- Join room overlay (mobile-friendly text input) -->
  <div id="join-overlay">
    <div class="join-title">Código de sala</div>
    <input id="join-input" type="text" maxlength="4" placeholder="ABCD" autocomplete="off" autocapitalize="characters" />
    <div id="join-submit">UNIRSE</div>
    <div id="join-cancel">CANCELAR</div>
  </div>

  <!-- Virtual gamepad (touch devices only — shown by JS) -->
  <div id="gamepad">
    <div class="pill-btn" id="btn-start">START</div>
    <div class="pill-btn" id="btn-back">BACK</div>

    <div id="dpad">
      <div class="dpad-btn" id="btn-up">▲</div>
      <div class="dpad-btn" id="btn-down">▼</div>
      <div class="dpad-btn" id="btn-left">◀</div>
      <div class="dpad-btn" id="btn-right">▶</div>
    </div>

    <div id="actions">
      <div class="action-btn" id="btn-punch">PUÑO</div>
      <div class="action-btn" id="btn-kick">PATADA</div>
      <div class="action-btn" id="btn-special">★</div>
    </div>
  </div>

  <!-- Vercel Analytics (free tier) -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>

  <!-- Engine -->
  <script src="https://unpkg.com/kaplay@3001/dist/kaplay.js"></script>

  <!-- Supabase client (for leaderboard + multiplayer) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- QR codes generated server-side via /api/qr (Vercel serverless) -->

  <!-- Local dev config (optional — gitignored, see supabase/README.md) -->
  <script src="env-config.js" onerror="/* not found = using /api/config instead */"></script>

  <!-- Game code (load order matters) -->
  <script src="js/constants.js"></script>
  <script src="js/entities.js"></script>
  <script src="js/dialogue.js"></script>
  <script src="js/multiplayer.js"></script>
  <script src="game.js"></script>

  <!-- Mobile gamepad wiring -->
  <script>
  (function() {
    if (!window.matchMedia("(pointer: coarse)").matches) return;
    document.getElementById("gamepad").style.display = "block";

    // Kaplay's canvas is the LAST canvas in the DOM (QR canvas is first)
    const canvases = document.querySelectorAll("canvas");
    const canvas = canvases[canvases.length - 1];
    const fire = (key, type) => {
      canvas.dispatchEvent(new KeyboardEvent(type, { key, bubbles: true }));
    };

    const MAP = {
      "btn-up":      "w",
      "btn-down":    "s",
      "btn-left":    "a",
      "btn-right":   "d",
      "btn-punch":   "z",
      "btn-kick":    "x",
      "btn-special": "q",
      "btn-start":   "Enter",
      "btn-back":    "Tab",
    };

    for (const [id, key] of Object.entries(MAP)) {
      const el = document.getElementById(id);
      el.addEventListener("touchstart", (e) => { e.preventDefault(); el.classList.add("active"); fire(key, "keydown"); }, { passive: false });
      el.addEventListener("touchend",   (e) => { e.preventDefault(); el.classList.remove("active"); fire(key, "keyup"); }, { passive: false });
      el.addEventListener("touchcancel",(e) => { el.classList.remove("active"); fire(key, "keyup"); });
    }
  })();
  </script>
</body>
</html>
